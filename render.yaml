services:
  - type: web
    name: paqu-tikhub-proxy
    runtime: python
    plan: free
    buildCommand: ""
    startCommand: python tikhub_proxy.py
    envVars:
      - key: ALLOWED_PROXY_HOSTS
        value: api.tikhub.io,api.tikhub.dev
      - key: TIKHUB_API_KEY
        sync: false
      - key: SCHEDULE_SECRET
        sync: false
      - key: SCHEDULE_ACCOUNTS
        sync: false
      - key: SCHEDULE_MAX_VIDEOS
        value: 100
      - key: SCHEDULE_USE_DRAMA_LIBRARY
        value: "1"
      - key: SCHEDULE_DRAMA_PAGE_SIZE
        value: 50
      - key: SCHEDULE_MAX_DRAMAS
        value: 0
      - key: SCHEDULE_USE_PLAYLISTS
        value: "1"
      - key: SCHEDULE_TRANSLATE_TITLES
        value: "1"
      - key: SCHEDULE_MAX_PLAYLISTS
        value: 300
      - key: SCHEDULE_PAGE_SIZE
        value: 30
      - key: SCHEDULE_PLAYLIST_PAGE_SIZE
        value: 20
      - key: SCHEDULE_PLAYLIST_VIDEO_PAGE_SIZE
        value: 30
      - key: SCHEDULE_MAX_PAGES
        value: 80
      - key: SCHEDULE_MAX_PLAYLIST_VIDEO_PAGES
        value: 200
      - key: SCHEDULE_MAX_RUNTIME_SECONDS
        value: 600
      - key: SCHEDULE_DELAY_MS
        value: 300
